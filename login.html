<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • NEXUS AI</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/animation.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card glass-strong">
      <!-- Header -->
      <div class="login-header">
        <div class="logo">
          <div class="logo-icon">N</div>
          <span class="logo-text">NEXUS</span>
        </div>
        <div class="tagline">AI Chat Platform • Futuristic Interface</div>
      </div>

      <form id="login-form">
        <!-- Provider Selection -->
        <div class="form-group">
          <label class="form-label">Pilih Provider AI</label>
          <select id="provider-select" class="select provider-select">
            <option value="OpenAI GPT">OpenAI GPT</option>
            <option value="Google Gemini">Google Gemini</option>
            <option value="DeepSeek">DeepSeek</option>
            <option value="OpenRouter">OpenRouter</option>
            <option value="Anthropic Claude">Anthropic Claude</option>
            <option value="Groq">Groq (Super Fast)</option>
            <option value="Mistral AI">Mistral AI</option>
            <option value="Cohere">Cohere</option>
            <option value="Custom API">Custom API (OpenAI Compatible)</option>
          </select>
        </div>

        <!-- API Key -->
        <div class="form-group">
          <label class="form-label">API Key</label>
          <div class="api-key-input-wrapper">
            <input type="password" id="api-key-input" class="input api-key-input" 
                   placeholder="sk-••••••••••••••••••••••••" required>
            <button type="button" class="toggle-visibility" id="toggle-key">👁️</button>
          </div>
          <div id="key-error" class="error-message hidden"></div>
        </div>

        <!-- Actions -->
        <div class="login-actions">
          <button type="submit" class="btn btn-primary login-btn">
            Masuk ke Dashboard
          </button>
          
          <div class="secondary-actions">
            <button type="button" id="change-provider-btn" class="btn btn-secondary">
              Ganti Provider
            </button>
            <button type="button" id="clear-key-btn" class="btn btn-danger">
              Hapus API Key
            </button>
          </div>
        </div>
      </form>

      <div class="divider">atau gunakan provider populer</div>

      <div class="supported-providers">
        <div class="provider-badge">GPT-4o / GPT-5</div>
        <div class="provider-badge">Gemini 2.5 Pro</div>
        <div class="provider-badge">Claude 3.5 Sonnet</div>
        <div class="provider-badge">Llama 3.1 405B</div>
        <div class="provider-badge">DeepSeek R1</div>
      </div>

      <p style="text-align:center; margin-top:32px; font-size:12px; color:var(--text-muted)">
        API Key disimpan aman di browser Anda (LocalStorage).<br>
        Tidak ada data yang dikirim ke server NEXUS.
      </p>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/provider.js"></script>
  <script>
    // Login Page Logic
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('login-form');
      const providerSelect = document.getElementById('provider-select');
      const apiKeyInput = document.getElementById('api-key-input');
      const toggleBtn = document.getElementById('toggle-key');
      const errorDiv = document.getElementById('key-error');
      const clearBtn = document.getElementById('clear-key-btn');
      const changeBtn = document.getElementById('change-provider-btn');

      // Load saved provider
      const savedProvider = StorageManager.getCurrentProvider();
      if (savedProvider) {
        providerSelect.value = savedProvider;
      }

      // Load saved key for this provider
      const updateKeyInput = () => {
        const key = StorageManager.getApiKey(providerSelect.value);
        if (key) {
          apiKeyInput.value = key;
          apiKeyInput.type = 'password';
        } else {
          apiKeyInput.value = '';
        }
        errorDiv.classList.add('hidden');
      };

      updateKeyInput();
      providerSelect.onchange = updateKeyInput;

      // Toggle visibility
      toggleBtn.onclick = () => {
        apiKeyInput.type = apiKeyInput.type === 'password' ? 'text' : 'password';
        toggleBtn.textContent = apiKeyInput.type === 'password' ? '👁️' : '🙈';
      };

      // Form submit
      form.onsubmit = (e) => {
        e.preventDefault();
        
        const provider = providerSelect.value;
        const key = apiKeyInput.value.trim();

        if (!key) {
          errorDiv.textContent = 'API Key wajib diisi';
          errorDiv.classList.remove('hidden');
          apiKeyInput.classList.add('input-error');
          return;
        }

        // Basic validation
        if (!Utils.isValidApiKey(key, provider) && provider !== 'Custom API') {
          if (!confirm('Format API Key tidak standar. Lanjutkan tetap?')) {
            return;
          }
        }

        // Save
        StorageManager.saveApiKey(provider, key);
        StorageManager.setCurrentProvider(provider);
        
        // Set a default model
        const models = ProviderConfig.getModels(provider);
        if (models.length > 0) {
          StorageManager.setCurrentModel(models[0].id);
        }

        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      };

      // Clear key
      clearBtn.onclick = () => {
        const provider = providerSelect.value;
        if (confirm(`Hapus API Key untuk ${provider}?`)) {
          StorageManager.deleteApiKey(provider);
          apiKeyInput.value = '';
          errorDiv.classList.add('hidden');
          apiKeyInput.classList.remove('input-error');
        }
      };

      // Change provider (just focus select)
      changeBtn.onclick = () => {
        providerSelect.focus();
        providerSelect.click();
      };

      // Remove error on typing
      apiKeyInput.oninput = () => {
        apiKeyInput.classList.remove('input-error');
        errorDiv.classList.add('hidden');
      };

      // Keyboard support
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          errorDiv.classList.add('hidden');
          apiKeyInput.classList.remove('input-error');
        }
      });
    });
  </script>
</body>
</html>
